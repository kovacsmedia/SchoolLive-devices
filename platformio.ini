[env:esp32s3]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- PSRAM (OSPI 8MB) ---
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; --- Partíciók ---
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.f_cpu = 240000000L

build_type = release

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DFW_VERSION=\"S3.4\"
    -Wno-unused-variable
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -fno-exceptions
    -fno-rtti
    -DAUDIO_ENABLE_SD=0
    -DAUDIO_ENABLE_SDMMC=0
    -DAUDIO_ENABLE_SPIFFS=0
    -DAUDIO_ENABLE_FFAT=0
    -DAUDIO_GCC_OPTIMIZE=\"Os\"
    -DWEBSOCKETS_NETWORK_TYPE=NETWORK_ESP32_ASYNC
    -DWEBSOCKET_DISABLED_MASKING=1

build_unflags =
    -O2

upload_protocol = esptool
monitor_filters = esp32_exception_decoder

lib_deps =
    ;https://github.com/schreibfaul1/ESP32-audioI2S/archive/refs/tags/3.0.8.zip
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^7.0.0
    links2004/WebSockets @ ^2.4.1